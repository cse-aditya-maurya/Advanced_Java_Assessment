server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    # ⭐ disable config client temporarily (to avoid import error)
    config:
      enabled: false
      import-check:
        enabled: false

    gateway:
      routes:
        - id: movie-service
          uri: lb://MOVIE-SERVICE
          predicates:
            - Path=/movies/**

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/bookings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ⭐ actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO